# Snake minigame (slightly optimized)
# No status-interval needed for snake — updates are push-based
# Require the server to update tmux conf with system call!

bind b \
  set -g @snake_active 1 \; \
  set -g @snake_render '          ' \; \
  set -g status-right '#{?#{@snake_active},|#[fg=brightgreen]#{@snake_render}#[default]|,}' \; \
  set -g status-right-length 14 \; \
  run-shell 'sh -c "~/.local/bin/braille-snake -t init -c 12 -a >/dev/null 2>&1 &"' \; \
  switch-client -T snake \; \
  display-message 'Snake mode'

bind -T snake Up    run-shell '~/.local/bin/braille-snake -t up >/dev/null 2>&1'    \; refresh-client -S \; switch-client -T snake
bind -T snake Down  run-shell '~/.local/bin/braille-snake -t down >/dev/null 2>&1'  \; refresh-client -S \; switch-client -T snake
bind -T snake Left  run-shell '~/.local/bin/braille-snake -t left >/dev/null 2>&1'  \; refresh-client -S \; switch-client -T snake
bind -T snake Right run-shell '~/.local/bin/braille-snake -t right >/dev/null 2>&1' \; refresh-client -S \; switch-client -T snake
bind -T snake r     run-shell '~/.local/bin/braille-snake -t restart >/dev/null 2>&1' \; refresh-client -S \; switch-client -T snake

bind -T snake q \
  run-shell '~/.local/bin/braille-snake -t quit >/dev/null 2>&1' \; \
  set -gu @snake_active \; \
  set -gu @snake_render \; \
  set -g status-right 'refresh' \; \
  set -g status-right-length 10 \; \
  switch-client -T root \; \
  refresh-client -S \; \
  display-message 'Snake mode off'

bind -T snake Escape \
  run-shell '~/.local/bin/braille-snake -t quit >/dev/null 2>&1' \; \
  set -gu @snake_active \; \
  set -gu @snake_render \; \
  set -g status-right 'refresh' \; \
  set -g status-right-length 10 \; \
  switch-client -T root \; \
  refresh-client -S \; \
  display-message 'Snake mode off'
