# TODO: instead of render (create unix socket) use cat in file ?

set -ga status-right '#(braille-snake -t render)'
set -g status-right-length 6
set -g status-interval 1

bind -n C-h run-shell 'braille-snake -t left; tmux refresh-client -S'
bind -n C-j run-shell 'braille-snake -t down; tmux refresh-client -S'
bind -n C-k run-shell 'braille-snake -t up; tmux refresh-client -S'
bind -n C-l run-shell 'braille-snake -t right; tmux refresh-client -S'

